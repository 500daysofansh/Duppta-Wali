<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DupattaWali — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  :root { --saffron:#E8600A; --dark:#1A1A2E; --border:#E8D5C4; --muted:#888; --green:#2D7A4F; --red:#E74C3C; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:#F0F0F5; color:var(--dark); min-height:100vh; }

  .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,var(--dark),#3D1F00); }
  .login-box { background:#fff; border-radius:24px; padding:48px 40px; width:100%; max-width:400px; text-align:center; box-shadow:0 24px 80px rgba(0,0,0,0.3); }
  .login-logo { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; color:var(--saffron); margin-bottom:6px; }
  .login-sub { font-size:13px; color:var(--muted); margin-bottom:32px; }
  .login-box input { width:100%; padding:14px 16px; border:1.5px solid var(--border); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; outline:none; margin-bottom:14px; }
  .login-box input:focus { border-color:var(--saffron); }
  .login-btn { width:100%; padding:15px; background:var(--saffron); color:#fff; border:none; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:16px; font-weight:700; cursor:pointer; }
  .login-btn:hover { background:#c45208; }
  .login-error { color:var(--red); font-size:13px; margin-top:12px; display:none; }

  .app { display:none; }
  .app-header { background:var(--dark); color:#fff; padding:0 28px; display:flex; align-items:center; justify-content:space-between; height:64px; position:sticky; top:0; z-index:50; }
  .app-header h1 { font-family:'Playfair Display',serif; font-size:20px; }
  .app-header h1 span { color:var(--saffron); }
  .hright { display:flex; align-items:center; gap:14px; }
  .live-dot { width:8px; height:8px; background:#2ECC71; border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .logout-btn { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.2); padding:7px 16px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; }

  .stats-bar { display:flex; gap:16px; padding:20px 28px; flex-wrap:wrap; }
  .stat { background:#fff; border-radius:14px; padding:18px 22px; flex:1; min-width:140px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .stat.s1 { border-left:4px solid var(--saffron); }
  .stat.s2 { border-left:4px solid var(--red); }
  .stat.s3 { border-left:4px solid var(--green); }
  .stat.s4 { border-left:4px solid #2980B9; }
  .stat-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .stat-value { font-size:26px; font-weight:700; }
  .stat.s1 .stat-value { color:var(--saffron); }
  .stat.s2 .stat-value { color:var(--red); }
  .stat.s3 .stat-value { color:var(--green); }
  .stat.s4 .stat-value { color:#2980B9; }

  .toolbar { padding:0 28px 16px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .search-box { flex:1; min-width:220px; padding:10px 16px; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; outline:none; background:#fff; }
  .search-box:focus { border-color:var(--saffron); }
  .filter-sel { padding:10px 14px; border:1.5px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; outline:none; background:#fff; cursor:pointer; }
  .refresh-btn { padding:10px 20px; background:var(--saffron); color:#fff; border:none; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
  .refresh-btn:hover { background:#c45208; }

  .table-wrap { padding:0 28px 40px; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.07); font-size:13px; min-width:1200px; }
  thead { background:var(--dark); color:#fff; }
  th { padding:14px; text-align:left; font-weight:600; white-space:nowrap; font-size:12px; }
  td { padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr.placed td { background:#F0FFF4; }
  tr.placed td:first-child { border-left:3px solid var(--green); }
  tr.pending td:first-child { border-left:3px solid #F39C12; }

  .badge { display:inline-flex; align-items:center; padding:4px 10px; border-radius:50px; font-size:11px; font-weight:700; white-space:nowrap; }
  .bp { background:#FFF3CD; color:#856404; }
  .bpl { background:#D4EDDA; color:var(--green); }
  .bc { background:#E8F4FD; color:#2980B9; }

  .abtn { padding:7px 14px; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .abtn.gn { background:var(--green); color:#fff; }
  .abtn.gn:hover { background:#1e5c39; }
  .abtn.or { background:#F39C12; color:#fff; }
  .abtn.or:hover { background:#d68910; }
  .abtn:disabled { opacity:.5; cursor:not-allowed; }

  .order-id { font-family:monospace; font-size:12px; background:#F5F5F5; padding:3px 8px; border-radius:6px; }
  .phone-link { color:var(--saffron); font-weight:600; text-decoration:none; }
  .msg-row { text-align:center; padding:50px; color:var(--muted); }
  .msg-row h3 { font-size:18px; margin-bottom:8px; }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(100px); color:#fff; padding:12px 24px; border-radius:50px; font-size:14px; font-weight:600; z-index:999; transition:transform .3s cubic-bezier(.34,1.56,.64,1); white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .toast.s { background:var(--green); }
  .toast.e { background:var(--red); }
  .toast.i { background:var(--dark); }
</style>
</head>
<body>

<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3MNYkhQHos3mU_GVn_VCkKAIBhgUD1xS22w9Q5bRD2Ey4xVpLDW3PuCrMlh2taHuA/exec";
  var ADMIN_PASSWORD = "dupattawali@2024";
</script>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">DupattaWali</div>
    <div class="login-sub">Admin Panel · Team Only</div>
    <input type="text" id="loginUser" placeholder="Your name (Anshuman / Aditya / Mannu)" />
    <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="login-error" id="loginError">❌ Wrong password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="mainApp">
  <div class="app-header">
    <h1>DupattaWali <span>Orders</span></h1>
    <div class="hright">
      <div class="live-dot"></div>
      <span style="font-size:12px;color:#2ECC71;font-weight:600">LIVE</span>
      <span id="adminName" style="font-size:13px;opacity:.7"></span>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat s1"><div class="stat-label">Total Orders</div><div class="stat-value" id="sTotal">—</div></div>
    <div class="stat s2"><div class="stat-label">Pending</div><div class="stat-value" id="sPending">—</div></div>
    <div class="stat s3"><div class="stat-label">Placed on Meesho</div><div class="stat-value" id="sPlaced">—</div></div>
    <div class="stat s4"><div class="stat-label">Total Revenue</div><div class="stat-value" id="sRevenue">—</div></div>
  </div>

  <div class="toolbar">
    <input class="search-box" id="searchBox" placeholder="🔍 Search name, phone, order ID..." oninput="renderTable()" />
    <select class="filter-sel" id="statusFilter" onchange="renderTable()">
      <option value="all">All Orders</option>
      <option value="Pending">Pending</option>
      <option value="Placed on Meesho">Placed on Meesho</option>
    </select>
    <button class="refresh-btn" onclick="loadOrders()">↻ Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Order ID</th><th>Date & Time</th>
          <th>Customer</th><th>Phone</th><th>Product</th>
          <th>Qty</th><th>Unit Price</th><th>Row Total</th><th>Grand Total</th>
          <th>Address</th><th>City</th><th>State</th><th>Pincode</th>
          <th>Payment</th><th>Status</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="17" class="msg-row"><h3>🔄 Loading...</h3></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var allOrders = [];

// ── LOGIN ─────────────────────────────────────────────────────
function doLogin() {
  var user = document.getElementById("loginUser").value.trim();
  var pass = document.getElementById("loginPass").value;
  if (!user) { alert("Enter your name"); return; }
  if (pass !== ADMIN_PASSWORD) {
    document.getElementById("loginError").style.display = "block";
    return;
  }
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  document.getElementById("adminName").textContent = "👤 " + user;
  loadOrders();
  setInterval(loadOrders, 60000);
}

function doLogout() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("mainApp").style.display = "none";
  document.getElementById("loginPass").value = "";
}

// ── LOAD ORDERS via JSONP ─────────────────────────────────────
function loadOrders() {
  showToast("🔄 Loading orders...", "i");

  // Remove previous script tag
  var old = document.getElementById("jsonpTag");
  if (old) old.parentNode.removeChild(old);

  // Global callback for JSONP
  window._ordersCallback = function(data) {
    if (!data.success) {
      showToast("❌ " + (data.error || "Failed to load"), "e");
      document.getElementById("ordersBody").innerHTML =
        '<tr><td colspan="17" class="msg-row"><h3>❌ Error: ' + (data.error || "Unknown") + '</h3></td></tr>';
      return;
    }
    allOrders = data.orders || [];
    updateStats();
    renderTable();
    showToast("✅ " + allOrders.length + " orders loaded", "s");
  };

  var script = document.createElement("script");
  script.id = "jsonpTag";
  script.src = SCRIPT_URL
    + "?action=getOrders"
    + "&password=" + encodeURIComponent(ADMIN_PASSWORD)
    + "&callback=_ordersCallback"
    + "&t=" + Date.now();
  script.onerror = function() {
    showToast("❌ Script load failed", "e");
    document.getElementById("ordersBody").innerHTML =
      '<tr><td colspan="17" class="msg-row"><h3>❌ Could not reach server</h3><p>Check your internet connection.</p></td></tr>';
  };
  document.head.appendChild(script);
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  var pending = 0, placed = 0, revenue = 0, seen = {};
  allOrders.forEach(function(o) {
    if (o["Status"] === "Pending") pending++;
    if (o["Status"] === "Placed on Meesho") placed++;
    if (!seen[o["Order ID"]]) {
      seen[o["Order ID"]] = true;
      revenue += parseFloat(o["Grand Total (Rs.)"] || 0);
    }
  });
  document.getElementById("sTotal").textContent = allOrders.length;
  document.getElementById("sPending").textContent = pending;
  document.getElementById("sPlaced").textContent = placed;
  document.getElementById("sRevenue").textContent = "Rs." + revenue.toLocaleString("en-IN");
}

// ── RENDER TABLE ──────────────────────────────────────────────
function renderTable() {
  var search = document.getElementById("searchBox").value.toLowerCase();
  var filter = document.getElementById("statusFilter").value;

  var filtered = allOrders.filter(function(o) {
    var ms = !search
      || (o["Customer Name"] || "").toLowerCase().includes(search)
      || (o["Phone"] || "").toString().includes(search)
      || (o["Order ID"] || "").toLowerCase().includes(search)
      || (o["Product Name"] || "").toLowerCase().includes(search);
    var mf = filter === "all" || o["Status"] === filter;
    return ms && mf;
  });

  var tbody = document.getElementById("ordersBody");
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="17" class="msg-row"><h3>📭 No orders found</h3><p>Try different search or filter.</p></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(o, i) {
    var placed = o["Status"] === "Placed on Meesho";
    var id = o["Order ID"] || "";
    return '<tr class="' + (placed ? "placed" : "pending") + '">'
      + '<td style="color:var(--muted);font-size:11px">' + (i + 1) + '</td>'
      + '<td><span class="order-id">' + id + '</span></td>'
      + '<td style="font-size:12px;white-space:nowrap">' + (o["Date"] || "") + '<br><span style="color:var(--muted)">' + (o["Time"] || "") + '</span></td>'
      + '<td><strong>' + (o["Customer Name"] || "") + '</strong></td>'
      + '<td><a class="phone-link" href="tel:' + (o["Phone"] || "") + '">' + (o["Phone"] || "") + '</a></td>'
      + '<td style="max-width:160px">' + (o["Product Name"] || "") + '</td>'
      + '<td style="text-align:center;font-weight:700">' + (o["Quantity"] || "") + '</td>'
      + '<td>Rs.' + (o["Unit Price (Rs.)"] || "") + '</td>'
      + '<td><strong>Rs.' + (o["Total Price (Rs.)"] || "") + '</strong></td>'
      + '<td><strong style="color:var(--saffron)">Rs.' + (o["Grand Total (Rs.)"] || "") + '</strong></td>'
      + '<td style="font-size:12px;max-width:160px">' + (o["Address"] || "") + '</td>'
      + '<td style="font-size:12px">' + (o["City"] || "") + '</td>'
      + '<td style="font-size:12px">' + (o["State"] || "") + '</td>'
      + '<td>' + (o["Pincode"] || "") + '</td>'
      + '<td><span class="badge bc">💵 COD</span></td>'
      + '<td><span class="badge ' + (placed ? "bpl" : "bp") + '">' + (placed ? "✅ Placed" : "⏳ Pending") + '</span></td>'
      + '<td>' + (placed
          ? '<button class="abtn or" onclick="updateStatus(\'' + id + '\',\'Pending\',this)">↩ Undo</button>'
          : '<button class="abtn gn" onclick="updateStatus(\'' + id + '\',\'Placed on Meesho\',this)">✅ Placed on Meesho</button>')
      + '</td></tr>';
  }).join("");
}

// ── UPDATE STATUS ─────────────────────────────────────────────
function updateStatus(orderId, newStatus, btn) {
  btn.disabled = true;
  btn.textContent = "Saving...";
  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify({ action: "updateStatus", orderId: orderId, status: newStatus })
  }).then(function() {
    allOrders.forEach(function(o) {
      if (o["Order ID"] === orderId) o["Status"] = newStatus;
    });
    updateStats();
    renderTable();
    showToast(newStatus === "Placed on Meesho" ? "✅ Marked as Placed on Meesho!" : "↩ Marked as Pending", "s");
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = newStatus === "Placed on Meesho" ? "✅ Placed on Meesho" : "↩ Undo";
    showToast("❌ Update failed. Try again.", "e");
  });
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + (type || "i") + " show";
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function() { t.classList.remove("show"); }, 3000);
}
</script>
</body>
</html>
