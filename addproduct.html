<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DupattaWali — Add Product</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root{--saffron:#E8600A;--dark:#1A1A2E;--brown:#3D1F00;--border:#E8D5C4;--muted:#888;--green:#2D7A4F;--red:#E74C3C;--cream:#FDF6EE;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:#F0F0F5;color:var(--dark);}
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dark),var(--brown));}
  .login-box{background:#fff;border-radius:20px;padding:44px 36px;width:100%;max-width:380px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.3);}
  .login-logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--saffron);margin-bottom:4px;}
  .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
  .login-box input{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-bottom:12px;}
  .login-box input:focus{border-color:var(--saffron);}
  .login-btn{width:100%;padding:14px;background:var(--saffron);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .login-btn:hover{background:#c45208;}
  .login-err{color:var(--red);font-size:13px;margin-top:10px;display:none;}
  .app{display:none;}
  .header{background:var(--dark);color:#fff;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .header h1{font-family:'Playfair Display',serif;font-size:18px;}
  .header h1 span{color:var(--saffron);}
  .nav-links{display:flex;gap:10px;}
  .nav-link{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;transition:all .2s;}
  .nav-link:hover,.nav-link.active{background:rgba(255,255,255,.1);color:#fff;}
  .logout-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .content{max-width:1100px;margin:0 auto;padding:28px 24px;}
  .layout{display:grid;grid-template-columns:400px 1fr;gap:24px;align-items:start;}
  @media(max-width:900px){.layout{grid-template-columns:1fr;}}
  .card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
  .card-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:20px;}
  .form-group{margin-bottom:16px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  input,select,textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--dark);background:#fff;outline:none;transition:border-color .2s;}
  input:focus,select:focus,textarea:focus{border-color:var(--saffron);box-shadow:0 0 0 3px rgba(232,96,10,.1);}
  textarea{resize:vertical;min-height:80px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .img-upload{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--cream);position:relative;}
  .img-upload:hover{border-color:var(--saffron);background:#FFF5EC;}
  .img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .img-upload-icon{font-size:32px;margin-bottom:8px;}
  .img-upload p{font-size:13px;color:var(--muted);}
  .img-preview{width:100%;height:200px;object-fit:cover;border-radius:10px;display:none;margin-bottom:12px;}
  .img-preview.show{display:block;}
  .submit-btn{width:100%;padding:15px;background:var(--saffron);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
  .submit-btn:hover{background:#c45208;}
  .submit-btn:disabled{background:var(--muted);cursor:not-allowed;}
  .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
  .spinner.show{display:block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .meesho-notice{background:#FFF3CD;border:1.5px solid #FFD700;border-radius:10px;padding:12px 14px;font-size:13px;color:#7A5C00;margin-bottom:16px;line-height:1.6;}
  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
  .prod-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1.5px solid var(--border);position:relative;}
  .prod-card.inactive{opacity:.5;}
  .prod-img{width:100%;height:150px;object-fit:cover;background:#F5E8D8;}
  .prod-img-placeholder{width:100%;height:150px;background:linear-gradient(135deg,#F5E8D8,#FFE5CC);display:flex;align-items:center;justify-content:center;font-size:36px;}
  .prod-body{padding:12px;}
  .prod-name{font-weight:700;font-size:13px;margin-bottom:4px;line-height:1.3;}
  .prod-price{font-size:14px;font-weight:700;color:var(--saffron);margin-bottom:8px;}
  .prod-cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;}
  .prod-actions{display:flex;gap:6px;}
  .pa-btn{flex:1;padding:6px;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .pa-del{background:#FDECEA;color:var(--red);}
  .pa-del:hover{background:var(--red);color:#fff;}
  .pa-toggle{background:#E8F5EE;color:var(--green);}
  .pa-toggle.off{background:#FFF3CD;color:#856404;}
  .meesho-btn{display:block;width:100%;padding:6px;background:#FFF0E0;color:var(--saffron);border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;text-decoration:none;margin-top:6px;transition:all .2s;}
  .meesho-btn:hover{background:var(--saffron);color:#fff;}
  .active-badge{position:absolute;top:8px;right:8px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;}
  .inactive-badge{position:absolute;top:8px;right:8px;background:#888;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;}
  .empty-products{text-align:center;padding:48px;color:var(--muted);}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .count-badge{background:var(--saffron);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:50px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.2);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.s{background:var(--green);}
  .toast.e{background:var(--red);}
  .toast.i{background:var(--dark);}
</style>
</head>
<body>
<script>
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3MNYkhQHos3mU_GVn_VCkKAIBhgUD1xS22w9Q5bRD2Ey4xVpLDW3PuCrMlh2taHuA/exec";
  var ADMIN_PASSWORD = "dupattawali@2024";
</script>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">DupattaWali</div>
    <div class="login-sub">Product Manager · Admin Only</div>
    <input type="text" id="loginUser" placeholder="Your name"/>
    <input type="password" id="loginPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="login-err" id="loginErr">❌ Wrong password</div>
  </div>
</div>

<div class="app" id="mainApp">
  <div class="header">
    <h1>DupattaWali <span>Products</span></h1>
    <div class="nav-links">
      <a class="nav-link active" href="addproduct.html">➕ Add Product</a>
      <a class="nav-link" href="admin.html">📋 Orders</a>
      <a class="nav-link" href="index.html">🛍️ Shop</a>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>

  <div class="content">
    <div class="layout">
      <div class="card">
        <div class="card-title">➕ Add New Product</div>
        <div class="form-group">
          <label>Product Photo *</label>
          <img id="imgPreview" class="img-preview" src="" alt="Preview"/>
          <div class="img-upload" id="imgUploadBox">
            <input type="file" id="imgInput" accept="image/*" onchange="handleImage(event)"/>
            <div class="img-upload-icon">📸</div>
            <p>Click to upload photo<br/><span style="font-size:11px">JPG, PNG — Max 2MB</span></p>
          </div>
        </div>
        <div class="form-group">
          <label>Product Name *</label>
          <input type="text" id="pName" placeholder="e.g. Floral Print Straight Kurta"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Selling Price (Rs.) *</label>
            <input type="number" id="pPrice" placeholder="399"/>
          </div>
          <div class="form-group">
            <label>MRP / Original (Rs.)</label>
            <input type="number" id="pOrigPrice" placeholder="799"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Category *</label>
            <select id="pCategory">
              <option value="kurta">Kurtis & Sets</option>
              <option value="jewellery">Jewellery</option>
              <option value="combo">Combo Deal</option>
              <option value="dupatta">Dupatta</option>
              <option value="bags">Bags & Accessories</option>
            </select>
          </div>
          <div class="form-group">
            <label>Badge</label>
            <select id="pBadge">
              <option value="">None</option>
              <option value="Bestseller">Bestseller</option>
              <option value="New">New</option>
              <option value="Trending">Trending</option>
              <option value="Best Value">Best Value</option>
              <option value="Exclusive">Exclusive</option>
              <option value="Sale">Sale</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="pDesc" placeholder="Short product description for customers..."></textarea>
        </div>
        <div class="meesho-notice">
          🔒 <strong>Meesho Link is private</strong> — only visible to you in the Orders panel. Customers never see it.
        </div>
        <div class="form-group">
          <label>Meesho Product Link * (private)</label>
          <input type="url" id="pMeesho" placeholder="https://meesho.com/product/..."/>
        </div>
        <button class="submit-btn" id="submitBtn" onclick="addProduct()">
          <span id="submitText">➕ Add Product to Website</span>
          <div class="spinner" id="submitSpinner"></div>
        </button>
      </div>

      <div>
        <div class="section-header">
          <div class="card-title" style="margin:0">📦 All Products <span class="count-badge" id="prodCount">0</span></div>
          <button style="padding:8px 16px;background:var(--dark);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;" onclick="loadProducts()">↻ Refresh</button>
        </div>
        <div id="productsGrid" class="products-grid">
          <div class="empty-products"><p>Loading...</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var products = [];
var imageBase64 = "";
var imageMime = "image/jpeg";

function doLogin() {
  var user = document.getElementById("loginUser").value.trim();
  var pass = document.getElementById("loginPass").value;
  if (!user) { alert("Enter your name"); return; }
  if (pass !== ADMIN_PASSWORD) { document.getElementById("loginErr").style.display="block"; return; }
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("mainApp").style.display = "block";
  loadProducts();
}
function doLogout() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("mainApp").style.display = "none";
  document.getElementById("loginPass").value = "";
}

function handleImage(e) {
  var file = e.target.files[0];
  if (!file) return;
  if (file.size > 2*1024*1024) { showToast("❌ Image too large. Max 2MB.","e"); return; }
  imageMime = file.type;
  var reader = new FileReader();
  reader.onload = function(ev) {
    imageBase64 = ev.target.result;
    var preview = document.getElementById("imgPreview");
    preview.src = imageBase64;
    preview.classList.add("show");
    document.getElementById("imgUploadBox").style.display = "none";
  };
  reader.readAsDataURL(file);
}

function addProduct() {
  var name = document.getElementById("pName").value.trim();
  var price = document.getElementById("pPrice").value.trim();
  var origPrice = document.getElementById("pOrigPrice").value.trim();
  var category = document.getElementById("pCategory").value;
  var badge = document.getElementById("pBadge").value;
  var desc = document.getElementById("pDesc").value.trim();
  var meesho = document.getElementById("pMeesho").value.trim();
  if (!name) { showToast("❌ Enter product name","e"); return; }
  if (!price) { showToast("❌ Enter selling price","e"); return; }
  if (!meesho) { showToast("❌ Enter Meesho link","e"); return; }
  if (!imageBase64) { showToast("❌ Upload a product photo","e"); return; }
  var btn=document.getElementById("submitBtn");
  var spin=document.getElementById("submitSpinner");
  var txt=document.getElementById("submitText");
  btn.disabled=true; spin.classList.add("show"); txt.style.display="none";
  showToast("⏳ Uploading photo & saving...","i");
  fetch(SCRIPT_URL,{
    method:"POST",mode:"no-cors",
    headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({
      action:"addProduct",password:ADMIN_PASSWORD,
      name:name,price:Number(price),
      origPrice:origPrice?Number(origPrice):"",
      category:category,badge:badge,description:desc,
      meeshoLink:meesho,imageBase64:imageBase64,imageMime:imageMime
    })
  }).then(function(){
    btn.disabled=false; spin.classList.remove("show"); txt.style.display="inline";
    showToast("✅ Product added! Refreshing...","s");
    resetForm();
    setTimeout(loadProducts,3000);
  }).catch(function(){
    btn.disabled=false; spin.classList.remove("show"); txt.style.display="inline";
    showToast("❌ Failed. Try again.","e");
  });
}

function resetForm() {
  document.getElementById("pName").value="";
  document.getElementById("pPrice").value="";
  document.getElementById("pOrigPrice").value="";
  document.getElementById("pDesc").value="";
  document.getElementById("pMeesho").value="";
  document.getElementById("pBadge").value="";
  document.getElementById("pCategory").value="kurta";
  document.getElementById("imgPreview").classList.remove("show");
  document.getElementById("imgUploadBox").style.display="block";
  document.getElementById("imgInput").value="";
  imageBase64="";
}

function loadProducts() {
  var old=document.getElementById("jsonpProd");
  if(old) old.parentNode.removeChild(old);
  window._prodCallback=function(data){
    if(!data.success){showToast("❌ "+(data.error||"Failed"),"e");return;}
    products=data.products||[];
    document.getElementById("prodCount").textContent=products.length;
    renderProducts();
  };
  var s=document.createElement("script");
  s.id="jsonpProd";
  s.src=SCRIPT_URL+"?action=getProductsAdmin&password="+encodeURIComponent(ADMIN_PASSWORD)+"&callback=_prodCallback&t="+Date.now();
  s.onerror=function(){showToast("❌ Could not load products","e");};
  document.head.appendChild(s);
}

function renderProducts() {
  var grid=document.getElementById("productsGrid");
  if(!products.length){
    grid.innerHTML='<div class="empty-products"><p style="font-size:15px">📦 No products yet.<br>Add your first product!</p></div>';
    return;
  }
  grid.innerHTML=products.map(function(p){
    var isActive=String(p.active).toUpperCase()==="YES";
    var imgHtml=p.img&&p.img!==""
      ?'<img class="prod-img" src="'+p.img+'" alt="'+p.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"/><div class="prod-img-placeholder" style="display:none">🛍️</div>'
      :'<div class="prod-img-placeholder">🛍️</div>';
    return '<div class="prod-card '+(isActive?"":"inactive")+'">'
      +'<span class="'+(isActive?"active-badge":"inactive-badge")+'">'+(isActive?"✅ Live":"⏸ Hidden")+'</span>'
      +imgHtml
      +'<div class="prod-body">'
      +'<div class="prod-cat">'+p.category+'</div>'
      +'<div class="prod-name">'+p.name+'</div>'
      +'<div class="prod-price">Rs.'+p.price+(p.origPrice?'<span style="font-size:10px;color:var(--muted);text-decoration:line-through;font-weight:400;margin-left:4px">Rs.'+p.origPrice+'</span>':'')+'</div>'
      +'<div class="prod-actions">'
      +'<button class="pa-btn pa-toggle '+(isActive?"":"off")+'" onclick="toggleProduct(\''+p.id+'\','+!isActive+')">'+(isActive?"⏸ Hide":"▶ Show")+'</button>'
      +'<button class="pa-btn pa-del" onclick="deleteProduct(\''+p.id+'\',\''+p.name.replace(/'/g,"")+'\')">🗑 Del</button>'
      +'</div>'
      +(p.meeshoLink?'<a class="meesho-btn" href="'+p.meeshoLink+'" target="_blank">🛒 Open on Meesho</a>':'')
      +'</div></div>';
  }).join("");
}

function deleteProduct(id,name){
  if(!confirm("Delete '"+name+"'? Cannot be undone.")) return;
  fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action:"deleteProduct",password:ADMIN_PASSWORD,productId:id})
  }).then(function(){showToast("🗑 Deleted","s");setTimeout(loadProducts,1500);})
  .catch(function(){showToast("❌ Delete failed","e");});
}

function toggleProduct(id,makeActive){
  fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({action:"toggleProduct",password:ADMIN_PASSWORD,productId:id,active:makeActive})
  }).then(function(){
    showToast(makeActive?"✅ Product is now Live":"⏸ Product hidden from shop","s");
    setTimeout(loadProducts,1500);
  }).catch(function(){showToast("❌ Failed","e");});
}

function showToast(msg,type){
  var t=document.getElementById("toast");
  t.textContent=msg; t.className="toast "+(type||"i")+" show";
  clearTimeout(window._tt);
  window._tt=setTimeout(function(){t.classList.remove("show");},3200);
}
</script>
</body>
</html>
